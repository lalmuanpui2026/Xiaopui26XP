<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XP Card Game - Traditional 4P</title>
    <style>
        :root { --gold: #d8a45f; --night: #0b132b; --table: #1a4314; --wood: #2a1810; }
        body { background: var(--night); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .table { background: radial-gradient(circle, var(--table), #051103); height: 100vh; position: relative; border: 12px solid var(--wood); box-sizing: border-box; }
        
        /* 🏠 Trick Piles (အိမ်ပုံများ) */
        .trick-pile { 
            position: absolute; width: 40px; height: 60px; 
            border: 2px solid rgba(216, 164, 95, 0.2); border-radius: 5px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.5);
        }
        .pile-1 { bottom: 200px; left: 40%; }
        .pile-2 { right: 130px; top: 40%; }
        .pile-3 { top: 160px; left: 40%; }
        .pile-4 { left: 130px; top: 40%; }

        /* 👤 Player Position (ကတ်ချမည့်နေရာများ) */
        .slot { position: absolute; width: 55px; height: 80px; border: 1px dashed rgba(255,255,255,0.2); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .slot-1 { bottom: 180px; left: 50%; transform: translateX(-50%); }
        .slot-2 { right: 80px; top: 50%; transform: translateY(-50%); }
        .slot-3 { top: 140px; left: 50%; transform: translateX(-50%); }
        .slot-4 { left: 80px; top: 50%; transform: translateY(-50%); }

        /* 🏷️ Name Labels */
        .label { position: absolute; padding: 4px 10px; border-radius: 5px; font-size: 11px; z-index: 100; border: 1px solid var(--gold); background: black; }
        .l1 { bottom: 145px; left: 50%; transform: translateX(-50%); }
        .l2 { right: 15px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
        .l3 { top: 100px; left: 50%; transform: translateX(-50%); }
        .l4 { left: 15px; top: 50%; transform: translateY(-50%) rotate(90deg); }
        .active { background: var(--gold); color: black; font-weight: bold; box-shadow: 0 0 15px var(--gold); }

        /* 🎴 Cards */
        .card { 
            width: 55px; height: 80px; background: white; color: black; border-radius: 6px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-weight: bold; border: 1px solid #999; cursor: pointer; font-size: 18px; box-shadow: 2px 2px 5px rgba(0,0,0,0.4);
        }
        .card.red { color: #d00; }
        .hand { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 5px; }
        
        .played-card { animation: cardIn 0.3s ease-out forwards; }
        @keyframes cardIn { from { opacity: 0; transform: scale(1.2); } to { opacity: 1; transform: scale(1); } }

        .scoreboard { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 8px; border: 1px solid var(--gold); font-size: 12px; }
    </style>
</head>
<body>

<div class="table">
    <div class="scoreboard">
        Team A (1&3): <b id="score-a" style="color:var(--gold)">0</b><br>
        Team B (2&4): <b id="score-b" style="color:var(--gold)">0</b>
    </div>

    <div id="slot-1" class="slot slot-1"></div>
    <div id="slot-2" class="slot slot-2"></div>
    <div id="slot-3" class="slot slot-3"></div>
    <div id="slot-4" class="slot slot-4"></div>

    <div id="pile-1" class="trick-pile pile-1">0</div>
    <div id="pile-2" class="trick-pile pile-2">0</div>
    <div id="pile-3" class="trick-pile pile-3">0</div>
    <div id="pile-4" class="trick-pile pile-4">0</div>

    <div id="lbl-1" class="label l1">P1 (Selector)</div>
    <div id="lbl-2" class="label l2">P2</div>
    <div id="lbl-3" class="label l3">P3</div>
    <div id="lbl-4" class="label l4">P4 (Dealer)</div>

    <div class="hand" id="my-hand"></div>
</div>

<script>
    const SUITS = ['♠', '♥', '♦', '♣'], RANKS = ['A', 'K', 'Q', 'J', '10', '9', '8', '7', '6', '5', '4', '3', '2'];
    let deck = [], players = [], trump = '♠', turn = 0, currentTrick = [], tricksWon = [0,0,0,0];

    function setupMatch() {
        players = [{id:1, hand:[]}, {id:2, hand:[]}, {id:3, hand:[]}, {id:4, hand:[]}];
        deck = [];
        SUITS.forEach(s => RANKS.forEach(r => deck.push({r, s})));
        deck.sort(() => Math.random() - 0.5);
        players.forEach(p => p.hand = deck.splice(0, 13));
        render();
    }

    function playCard(pIdx, cIdx) {
        if (turn !== pIdx) return;
        let card = players[pIdx].hand.splice(cIdx, 1)[0];
        currentTrick.push({card, pIdx});
        
        // ကတ်ကို သူ့နေရာနဲ့သူ ပေါ်အောင်လုပ်ခြင်း
        const slot = document.getElementById(`slot-${pIdx+1}`);
        let color = (card.s==='♥'||card.s==='♦') ? 'red' : 'black';
        slot.innerHTML = `<div class="card played-card" style="color:${color}">${card.r}${card.s}</div>`;
        
        render();
        turn = (turn + 1) % 4;
        if (currentTrick.length === 4) setTimeout(resolveTrick, 1000);
        else if (turn !== 0) setTimeout(aiPlay, 800);
    }

    function aiPlay() {
        let p = players[turn];
        let lead = currentTrick[0].card.s;
        let idx = p.hand.findIndex(c => c.s === lead);
        if (idx === -1) idx = 0;
        playCard(turn, idx);
    }

    function resolveTrick() {
        let lead = currentTrick[0].card.s;
        let winner = currentTrick[0];
        currentTrick.forEach(t => {
            if (t.card.s === trump && winner.card.s !== trump) winner = t;
            else if (t.card.s === winner.card.s && RANKS.indexOf(t.card.r) < RANKS.indexOf(winner.card.r)) winner = t;
            else if (t.card.s === lead && winner.card.s !== trump && RANKS.indexOf(t.card.r) < RANKS.indexOf(winner.card.r)) winner = t;
        });

        tricksWon[winner.pIdx]++;
        document.getElementById(`pile-${winner.pIdx+1}`).innerText = tricksWon[winner.pIdx];
        document.getElementById(`pile-${winner.pIdx+1}`).style.borderColor = "var(--gold)";

        // Score Update
        document.getElementById('score-a').innerText = tricksWon[0] + tricksWon[2];
        document.getElementById('score-b').innerText = tricksWon[1] + tricksWon[3];

        setTimeout(() => {
            for(let i=1; i<=4; i++) document.getElementById(`slot-${i}`).innerHTML = '';
            document.querySelectorAll('.trick-pile').forEach(p => p.style.borderColor = "rgba(216,164,95,0.2)");
            currentTrick = [];
            turn = winner.pIdx;
            render();
            if (players[0].hand.length > 0 && turn !== 0) aiPlay();
        }, 1000);
    }

    function render() {
        const handDiv = document.getElementById('my-hand');
        handDiv.innerHTML = '';
        players[0].hand.sort((a,b) => SUITS.indexOf(a.s) - SUITS.indexOf(b.s)).forEach((c, i) => {
            let div = document.createElement('div');
            div.className = `card ${(c.s==='♥'||c.s==='♦')?'red':''}`;
            div.innerHTML = `${c.r}<br>${c.s}`;
            div.onclick = () => playCard(0, i);
            handDiv.appendChild(div);
        });
        for(let i=1; i<=4; i++) document.getElementById(`lbl-${i}`).className = `label l${i} ${turn===i-1?'active':''}`;
    }

    setupMatch();
</script>
</body>
</html>
